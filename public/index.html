<!DOCTYPE html>
<html>
<head>
  <title>STK Bot</title>
  <style>
    body { font-family: Arial; max-width: 400px; margin: 50px auto; }
    input, button { width: 100%; padding: 10px; margin: 10px 0; }
  </style>
</head>
<body>
  <h2>Send STK Push</h2>
  <input id="phone" placeholder="Phone (07...)" />
  <input id="amount" placeholder="Amount" />
  <input id="reference" placeholder="Reference" />
  <button onclick="send()">Send Payment</button>
  <p id="msg"></p>

<script>
async function send() {
  const phone = document.getElementById("phone").value;
  const amount = document.getElementById("amount").value;
  const reference = document.getElementById("reference").value;

  const res = await fetch("/stk", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ phone, amount, reference })
  });

  const data = await res.json();
  document.getElementById("msg").innerText = data.success ? "✅ Sent!" : "❌ Failed";
}
</script>
</body>
</html>
